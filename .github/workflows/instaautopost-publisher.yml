name: InstaAutoPost Publisher

on:
  # Runs every 5 minutes; each execution processes at most one due queue item.
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
    inputs:
      queue_id:
        description: 'Queue item ID to publish (leave empty to process next due item)'
        required: false
        default: ''
      live_mode:
        description: 'Enable live Instagram publishing for this run (true/false)'
        required: false
        default: 'false'
      live_confirmation:
        description: 'Type exactly PUBLISH LIVE to confirm a live run. Ignored in dry-run.'
        required: false
        default: ''

# Prevent overlapping publisher runs. cancel-in-progress: false means an in-progress run
# blocks a new trigger; one pending run may wait. This protects against a second worker
# claiming a row while the first is mid-publish.
concurrency:
  group: instaautopost-publisher
  cancel-in-progress: false

# IMPORTANT: this workflow must call only scripts/instaautopost_publisher.py.
# scripts/admin/ and scripts/local/ are operator/developer utilities and must
# never appear in this workflow.
jobs:
  publish_dry_run:
    name: InstaAutoPost Publisher Worker (dry-run)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: ${{ github.event.inputs.live_mode != 'true' && github.event_name != 'schedule' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run InstaAutoPost Publisher Worker
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          # Derived solely from the workflow_dispatch input — no fallback to
          # vars.INSTAGRAM_API_ENABLED. Dry-run is the default when live_mode is false.
          INSTAGRAM_API_ENABLED: 'false'
          # Explicit confirmation phrase checked by the script before any live queue claim.
          # The script exits 1 if this is absent or does not equal "PUBLISH LIVE".
          INSTAAUTOPOST_LIVE_CONFIRMATION: ${{ github.event.inputs.live_confirmation }}
          # When set, the worker processes only this queue item (one-click publish flow).
          # Leave empty for the default "next due item" behaviour.
          TARGET_QUEUE_ID: ${{ github.event.inputs.queue_id }}
        run: |
          echo "InstaAutoPost Publisher — starting"
          python scripts/instaautopost_publisher.py
          echo "InstaAutoPost Publisher — done"

  publish_live:
    name: InstaAutoPost Publisher Worker (live)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: ${{ github.event.inputs.live_mode == 'true' || github.event_name == 'schedule' }}
    # Reference the instagram-live environment only when live_mode is true.
    # Dry-run runs use publish_dry_run (above) and bypass this environment gate entirely.
    # Before enabling live publishing, create this environment in
    # Settings > Environments with at least one required reviewer.
    environment: instagram-live

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run InstaAutoPost Publisher Worker
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          # Always true for this job — both live dispatch and cron schedule are live runs.
          INSTAGRAM_API_ENABLED: 'true'
          # For schedule events github.event.inputs is null; supply the phrase directly so
          # the script's confirmation guard passes on automated cron runs.
          INSTAAUTOPOST_LIVE_CONFIRMATION: ${{ github.event_name == 'schedule' && 'PUBLISH LIVE' || github.event.inputs.live_confirmation }}
          # When set, the worker processes only this queue item (one-click publish flow).
          # Leave empty for the default "next due item" behaviour.
          TARGET_QUEUE_ID: ${{ github.event.inputs.queue_id }}
        run: |
          echo "InstaAutoPost Publisher — starting"
          python scripts/instaautopost_publisher.py
          echo "InstaAutoPost Publisher — done"
