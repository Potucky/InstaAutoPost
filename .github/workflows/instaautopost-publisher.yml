name: InstaAutoPost Publisher

on:
  # Runs every 5 minutes; each execution processes at most one due queue item. Schedule refreshed 2026-05-24.
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
    inputs:
      queue_id:
        description: 'Queue item ID to publish (leave empty to process next due item)'
        required: false
        default: ''

# Prevent overlapping publisher runs. cancel-in-progress: false means an in-progress run
# blocks a new trigger; one pending run may wait. This protects against a second worker
# claiming a row while the first is mid-publish.
concurrency:
  group: instaautopost-publisher
  cancel-in-progress: false

# IMPORTANT: this workflow must call only scripts/instaautopost_publisher.py.
# scripts/admin/ and scripts/local/ are operator/developer utilities and must
# never appear in this workflow.
jobs:
  publish:
    name: InstaAutoPost Publisher Worker
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run InstaAutoPost Publisher Worker
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          # Production workflow always publishes live. For local dry-run, set
          # INSTAGRAM_API_ENABLED=false when running the script directly.
          INSTAGRAM_API_ENABLED: 'true'
          # When set, the worker processes only this queue item (one-click publish flow).
          # Leave empty for the default "next due item" behaviour.
          TARGET_QUEUE_ID: ${{ github.event.inputs.queue_id }}
        run: |
          echo "InstaAutoPost Publisher — starting"
          python scripts/instaautopost_publisher.py
          echo "InstaAutoPost Publisher — done"
